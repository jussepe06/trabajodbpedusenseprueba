<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar cita | EDU-SENSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#101415] text-white min-h-screen">

    <div class="max-w-4xl mx-auto px-6 py-10">

        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold">
                    Solicitar orientación
                </h1>
                <p class="text-gray-400 mt-2">
                    Agenda una cita con un orientador académico
                </p>
            </div>

            <a href="/student-dashboard/"
               class="px-5 py-3 rounded-2xl bg-cyan-400 text-black font-semibold">
                Volver
            </a>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-3xl p-8">

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block mb-3 text-lg font-semibold">
                        Orientador
                    </label>

                    <select
                        name="counselor"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4"
                    >
                        {% for counselor in counselors %}
                        <option value="{{ counselor.id }}">
                            {{ counselor.username }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block mb-3 text-lg font-semibold">
                        Fecha
                    </label>

                    <input
                        type="date"
                        name="appointment_date"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4"
                    >
                </div>

                <div>
                    <label class="block mb-3 text-lg font-semibold">
                        Hora
                    </label>

                    <input
                        type="time"
                        name="appointment_time"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4"
                    >
                </div>

                <div>
                    <label class="block mb-3 text-lg font-semibold">
                        Motivo
                    </label>

                    <textarea
                        name="observations"
                        rows="5"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4"
                    ></textarea>
                </div>

                <button
                    type="submit"
                    class="w-full py-5 rounded-2xl bg-cyan-400 text-black font-bold text-lg"
                >
                    Solicitar cita
                </button>
            </form>

        </div>

    </div>

</body>
</html>
